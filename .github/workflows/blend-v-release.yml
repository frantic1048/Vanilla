name: Release

on:
  push:
    tags:
      - "blend-v**[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write
  attestations: write
  id-token: write
  packages: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-26
          - target: x86_64-apple-darwin
            runner: macos-26-intel
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: step-security/dtolnay-rust-toolchain@8dd607977d06adf4ed49b190381e74c17a9dd25f # v1.0.0
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: blend

      - name: Package archive
        shell: bash
        run: |
          ARCHIVE_DIR="blend-${{ matrix.target }}"
          mkdir "$ARCHIVE_DIR"
          cp "target/${{ matrix.target }}/release/blend" "$ARCHIVE_DIR/"
          cp blend/README.md blend/CHANGELOG.md LICENSE "$ARCHIVE_DIR/"
          tar cJf "${ARCHIVE_DIR}.tar.xz" "$ARCHIVE_DIR"
          sha256sum "${ARCHIVE_DIR}.tar.xz" > "${ARCHIVE_DIR}.tar.xz.sha256"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "blend-${{ matrix.target }}.tar.xz"

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archive-${{ matrix.target }}
          path: |
            blend-${{ matrix.target }}.tar.xz
            blend-${{ matrix.target }}.tar.xz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: archive-*
          path: artifacts
          merge-multiple: true

      - name: Generate combined checksums
        run: |
          cd artifacts
          cat *.sha256 > sha256.sum

      - name: Generate installer
        run: |
          VERSION="${GITHUB_REF_NAME#blend-v}"

          cp .github/install_template.sh artifacts/blend-installer.sh

          sed -i "s/__APP_VERSION__/${VERSION}/" artifacts/blend-installer.sh

          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu; do
            CHECKSUM=$(grep "blend-${target}.tar.xz" artifacts/sha256.sum | cut -d' ' -f1)
            PLACEHOLDER="__CHECKSUM_$(echo "$target" | tr '[:lower:]-' '[:upper:]_')__"
            sed -i "s/${PLACEHOLDER}/${CHECKSUM}/" artifacts/blend-installer.sh
          done

          chmod +x artifacts/blend-installer.sh

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#blend-v}"

          # Extract the section for this version from CHANGELOG.md
          # Starts after "## [x.y.z]" heading, stops at next "## " heading
          NOTES=$(awk -v ver="$VERSION" '
            /^## / {
              if (found) exit
              if (index($0, "[" ver "]")) found = 1
              next
            }
            found { print }
          ' blend/CHANGELOG.md)

          if [ -z "$NOTES" ]; then
            NOTES="Release blend v${VERSION}"
          fi

          # Write to file to avoid quoting issues
          echo "$NOTES" > "$RUNNER_TEMP/release-notes.txt"

      - name: Create release app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#blend-v}"

          # Detect prerelease
          PRERELEASE_FLAG=""
          case "$VERSION" in
            *-*) PRERELEASE_FLAG="--prerelease" ;;
          esac

          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "blend v${VERSION}" \
            --notes-file "$RUNNER_TEMP/release-notes.txt" \
            $PRERELEASE_FLAG \
            artifacts/blend-*.tar.xz \
            artifacts/blend-*.tar.xz.sha256 \
            artifacts/sha256.sum \
            artifacts/blend-installer.sh

  docker:
    name: Publish Docker image
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download Linux artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: archive-x86_64-unknown-linux-gnu
          path: artifacts

      - name: Extract binary
        run: |
          tar xJf artifacts/blend-x86_64-unknown-linux-gnu.tar.xz
          cp blend-x86_64-unknown-linux-gnu/blend blend/

      - name: Log in to ghcr.io
        uses: step-security/docker-login-action@164e21d7e52229904128e2f946001cb88278c33d # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          VERSION="${GITHUB_REF_NAME#blend-v}"
          TAGS="ghcr.io/${{ github.repository_owner }}/blend:${VERSION}"

          # Only tag latest for stable releases (no hyphen in version)
          case "$VERSION" in
            *-*) ;;
            *) TAGS="${TAGS},ghcr.io/${{ github.repository_owner }}/blend:latest" ;;
          esac

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        id: build
        uses: step-security/docker-build-push-action@9af9b5acc1751dcec2aa5375a068979fa526bc9a # v7.2.0
        with:
          context: blend
          push: true
          tags: ${{ steps.tags.outputs.tags }}

      - name: Attest Docker image provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/blend
          subject-digest: ${{ steps.build.outputs.digest }}

  notify-tap:
    name: Notify Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Check if prerelease
        id: check
        run: |
          VERSION="${GITHUB_REF_NAME#blend-v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create app token for homebrew-tap
        if: steps.check.outputs.prerelease == 'false'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3
        with:
          client-id: ${{ secrets.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: homebrew-tap
          permission-contents: write

      - name: Dispatch formula update
        if: steps.check.outputs.prerelease == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#blend-v}"

          gh api \
            --method POST \
            "/repos/${{ github.repository_owner }}/homebrew-tap/dispatches" \
            -f event_type="update-formula" \
            -f "client_payload[formula]=blend" \
            -f "client_payload[version]=$VERSION"

          echo "::notice::Dispatched formula update for blend v${VERSION} to homebrew-tap"

