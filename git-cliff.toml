[changelog]
header = """# Changelog

All notable changes to blend will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

## [Unreleased]

"""
body = """
## [{{ version }}]{%- if release_link -%}({{ release_link }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
{%- if commit.scope -%}
- *({{commit.scope}})* {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message }}{%- if commit.links %} ({% for link in commit.links %}[{{link.text}}]({{link.href}}) {% endfor -%}){% endif %}
{% else -%}
- {% if commit.breaking %}[**breaking**] {% endif %}{{ commit.message }}
{% endif -%}
{% endfor -%}
{% endfor %}
"""
trim = true

[git]
tag_pattern = "blend-v[0-9].*"
# Keep blend release notes scoped to the product plus release/build plumbing.
include_paths = [
  "blend/**",
  "Cargo.toml",
  "Cargo.lock",
  "release-plz.toml",
  "git-cliff.toml",
  "dist-workspace.toml",
  ".github/dist-build-setup.yml",
  ".github/workflows/release-plz.yml",
  ".github/workflows/blend-v-release.yml",
]
# Allow non-conventional commit messages to pass through to commit_parsers
# so the catch-all parser can pick them up instead of silently dropping them.
filter_unconventional = false
commit_preprocessors = [
  { pattern = "\\(#([0-9]+)\\)", replace = "([#${1}](https://github.com/frantic1048/Vanilla/pull/${1}))" },
]
commit_parsers = [
  { message = "^feat", group = "added" },
  { message = "^changed", group = "changed" },
  { message = "^deprecated", group = "deprecated" },
  { message = "^fix", group = "fixed" },
  { message = "^security", group = "security" },
  { message = "^.*", group = "other" },
]
