[workspace]
# release-plz's inline [changelog] config does not expose git-cliff include_paths.
changelog_config = "git-cliff.toml"
dependencies_update = false
git_only = true
git_release_enable = false
git_tag_name = "blend-v{{ version }}"
pr_branch_prefix = "release-plz/"
pr_name = "chore(blend): release {{ version }}"
publish = false
release_always = false
repo_url = "https://github.com/frantic1048/Vanilla"
semver_check = false

[[package]]
name = "blend"
changelog_path = "blend/CHANGELOG.md"

